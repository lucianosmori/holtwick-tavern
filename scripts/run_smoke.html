<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Holtwick smoke harness</title>
<style>
  body { font: 14px/1.4 system-ui, sans-serif; margin: 1rem; max-width: 1100px; }
  h1 { font-size: 1.1rem; margin: 0 0 .5rem; }
  .row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin-bottom: .5rem; }
  button { padding: .35rem .7rem; cursor: pointer; }
  button[disabled] { opacity: .5; cursor: not-allowed; }
  .status { font-family: ui-monospace, monospace; color: #444; }
  .status.error { color: #b00020; }
  .status.ready { color: #0a7d2c; }
  table { border-collapse: collapse; width: 100%; margin-top: .75rem; font-size: 12px; }
  th, td { border: 1px solid #ddd; padding: 4px 6px; vertical-align: top; }
  th { background: #f4f4f4; text-align: left; }
  td.metric { font-family: ui-monospace, monospace; text-align: right; white-space: nowrap; }
  td.reply { max-width: 520px; }
  textarea { width: 100%; height: 260px; font: 12px/1.4 ui-monospace, monospace; }
  .pill { display: inline-block; padding: 1px 6px; border-radius: 3px; background: #eef; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <h1>Holtwick smoke harness — <span id="hdr-model" class="pill">model TBD</span></h1>
  <div class="row">
    <button id="run">Run smoke set</button>
    <button id="copy" disabled>Copy JSON</button>
    <button id="download" disabled>Download JSON</button>
    <span id="status" class="status">idle</span>
  </div>
  <p class="status">
    URL override: append <code>?model=&lt;MLC_ID&gt;</code> (e.g.
    <code>?model=SmolLM2-360M-Instruct-q4f16_1-MLC</code>). Defaults to the baseline if omitted.
    Same persona JSONs and runtime params as the live tavern.
  </p>
  <table id="results-table">
    <thead>
      <tr>
        <th>npc</th><th>id</th><th>kind</th><th>turn</th>
        <th>user</th><th>reply</th>
        <th>first&nbsp;ms</th><th>total&nbsp;ms</th><th>tok&nbsp;out</th><th>tok/s</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <h2 style="font-size:1rem;margin:1rem 0 .25rem;">Raw JSON</h2>
  <textarea id="raw" readonly placeholder="JSON appears here after the run completes."></textarea>

<script type="module">
  import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm@0.2.79";

  const DEFAULT_MODEL_ID = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC";
  const MODEL_ID = new URLSearchParams(location.search).get('model') || DEFAULT_MODEL_ID;

  const $hdr = document.getElementById('hdr-model');
  const $status = document.getElementById('status');
  const $run = document.getElementById('run');
  const $copy = document.getElementById('copy');
  const $download = document.getElementById('download');
  const $raw = document.getElementById('raw');
  const $tbody = document.querySelector('#results-table tbody');

  $hdr.textContent = MODEL_ID;

  function setStatus(text, kind = '') {
    $status.textContent = text;
    $status.className = 'status' + (kind ? ' ' + kind : '');
  }

  function buildMessages(npc, userHistory) {
    const fewShot = (npc.few_shots || []).flatMap(ex => ([
      { role: 'user', content: ex.user },
      { role: 'assistant', content: ex.assistant },
    ]));
    return [
      { role: 'system', content: npc.system_prompt },
      ...fewShot,
      ...userHistory,
    ];
  }

  function appendRow({ npc, id, kind, turn, user, reply, first_token_ms, total_ms, tokens_out }) {
    const tr = document.createElement('tr');
    const tps = (tokens_out && total_ms) ? (tokens_out / (total_ms / 1000)).toFixed(2) : '';
    tr.innerHTML = `
      <td>${npc}</td>
      <td>${id}</td>
      <td>${kind}</td>
      <td class="metric">${turn}</td>
      <td>${escape(user)}</td>
      <td class="reply">${escape(reply)}</td>
      <td class="metric">${first_token_ms ?? ''}</td>
      <td class="metric">${total_ms ?? ''}</td>
      <td class="metric">${tokens_out ?? ''}</td>
      <td class="metric">${tps}</td>
    `;
    $tbody.appendChild(tr);
  }
  function escape(s) {
    return String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  }

  async function fetchJson(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${url} -> ${r.status}`);
    return r.json();
  }

  async function runOnce() {
    $run.disabled = true;
    $copy.disabled = true;
    $download.disabled = true;
    $raw.value = '';
    $tbody.innerHTML = '';

    setStatus('loading spec…');
    const [spec, edda, finn] = await Promise.all([
      fetchJson('./smoke-prompts.json'),
      fetchJson('../npcs/edda.json'),
      fetchJson('../npcs/finn.json'),
    ]);
    const npcMap = { edda, finn };
    const runtime = spec.runtime || {};

    setStatus(`downloading model: ${MODEL_ID}…`);
    let engine;
    try {
      engine = await CreateMLCEngine(MODEL_ID, {
        initProgressCallback: (p) => {
          const pct = Math.round((p.progress ?? 0) * 100);
          setStatus(`loading ${pct}% — ${p.text || ''}`);
        },
      });
    } catch (err) {
      console.error(err);
      setStatus(`init failed: ${err.message || err}`, 'error');
      $run.disabled = false;
      return;
    }

    const out = {
      schema_version: 1,
      model_id: MODEL_ID,
      user_agent: navigator.userAgent,
      started_at: new Date().toISOString(),
      runtime_used: runtime,
      entries: [],
    };

    const ordered = [];
    for (const npcId of ['edda', 'finn']) {
      for (const entry of (spec[npcId] || [])) ordered.push({ npcId, entry });
    }

    let n = 0;
    const total = ordered.reduce((s, x) => s + x.entry.turns.length, 0);

    for (const { npcId, entry } of ordered) {
      const npc = npcMap[npcId];
      const rt = runtime[npcId] || {};
      const temperature = rt.temperature ?? npc.model?.temperature ?? 0.8;
      const max_tokens = rt.max_tokens ?? npc.model?.max_tokens ?? 120;

      const history = [];
      const turnRecords = [];

      for (let t = 0; t < entry.turns.length; t++) {
        n++;
        setStatus(`running ${npcId}/${entry.id} turn ${t + 1}/${entry.turns.length} (${n}/${total})`);
        const userText = entry.turns[t];
        history.push({ role: 'user', content: userText });

        const t0 = performance.now();
        let tFirst = null;
        let reply = '';
        let tokens_out = null;

        try {
          const stream = await engine.chat.completions.create({
            messages: buildMessages(npc, history),
            stream: true,
            stream_options: { include_usage: true },
            temperature,
            max_tokens,
          });
          for await (const chunk of stream) {
            const delta = chunk.choices?.[0]?.delta?.content || '';
            if (delta && tFirst === null) tFirst = performance.now();
            reply += delta;
            if (chunk.usage && chunk.usage.completion_tokens != null) {
              tokens_out = chunk.usage.completion_tokens;
            }
          }
        } catch (err) {
          console.error('completion failed', err);
          reply = `__ERROR__ ${err.message || err}`;
        }
        const t1 = performance.now();

        history.push({ role: 'assistant', content: reply });

        const rec = {
          turn: t + 1,
          user: userText,
          reply,
          first_token_ms: tFirst ? Math.round(tFirst - t0) : null,
          total_ms: Math.round(t1 - t0),
          tokens_out,
        };
        turnRecords.push(rec);
        appendRow({
          npc: npcId, id: entry.id, kind: entry.kind,
          turn: rec.turn, user: rec.user, reply: rec.reply,
          first_token_ms: rec.first_token_ms, total_ms: rec.total_ms, tokens_out: rec.tokens_out,
        });
      }

      out.entries.push({
        npc: npcId, id: entry.id, kind: entry.kind,
        temperature, max_tokens,
        turns: turnRecords,
      });
    }

    out.finished_at = new Date().toISOString();
    $raw.value = JSON.stringify(out, null, 2);
    setStatus(`done — ${total} turns across ${ordered.length} prompts`, 'ready');
    $copy.disabled = false;
    $download.disabled = false;
    $run.disabled = false;
  }

  $run.addEventListener('click', () => {
    runOnce().catch(err => {
      console.error(err);
      setStatus(`fatal: ${err.message || err}`, 'error');
      $run.disabled = false;
    });
  });

  $copy.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText($raw.value);
      setStatus('copied to clipboard', 'ready');
    } catch (err) {
      setStatus(`copy failed: ${err.message || err}`, 'error');
    }
  });

  $download.addEventListener('click', () => {
    const blob = new Blob([$raw.value], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const slug = MODEL_ID.replace(/[^A-Za-z0-9.-]+/g, '_');
    a.href = url;
    a.download = `results-${slug}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });
</script>
</body>
</html>
